<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta — CraftLog</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="auth-page">

    <a href="index.html" class="navbar-brand" style="text-decoration:none;">
      <div class="brand-icon" aria-hidden="true">
        <div class="brand-icon-pixel dark"></div>
        <div class="brand-icon-pixel light"></div>
        <div class="brand-icon-pixel"></div>
        <div class="brand-icon-pixel dark"></div>
        <div class="brand-icon-pixel light"></div>
        <div class="brand-icon-pixel"></div>
        <div class="brand-icon-pixel dark"></div>
        <div class="brand-icon-pixel light"></div>
        <div class="brand-icon-pixel"></div>
        <div class="brand-icon-pixel darker"></div>
        <div class="brand-icon-pixel"></div>
        <div class="brand-icon-pixel dark"></div>
        <div class="brand-icon-pixel dark"></div>
        <div class="brand-icon-pixel"></div>
        <div class="brand-icon-pixel darker"></div>
        <div class="brand-icon-pixel dark"></div>
      </div>
      <div>
        <div class="brand-text">CRAFTLOG</div>
        <div class="brand-sub">Calculadora logística</div>
      </div>
    </a>

    <div class="auth-box animate-in">
      <h1 class="auth-title">Crea tu cuenta</h1>
      <p class="auth-sub">Empieza a planificar tus proyectos hoy</p>

      <form class="auth-form" id="registerForm" novalidate>

        <div class="input-group">
          <label for="regUser" class="input-label">Nombre de usuario</label>
          <input
            type="text"
            id="regUser"
            class="input-field"
            placeholder="Steve_Builder"
            autocomplete="username"
            required
            minlength="4"
          >
        </div>

        <div class="input-group">
          <label for="regEmail" class="input-label">Correo electrónico</label>
          <input
            type="email"
            id="regEmail"
            class="input-field"
            placeholder="tu@correo.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="input-group">
          <label for="regPass" class="input-label">Contraseña</label>
          <input
            type="password"
            id="regPass"
            class="input-field"
            placeholder="Mínimo 6 caracteres"
            autocomplete="new-password"
            required
            minlength="6"
          >
        </div>

        <div class="input-group">
          <label for="regPassConfirm" class="input-label">Confirmar contraseña</label>
          <input
            type="password"
            id="regPassConfirm"
            class="input-field"
            placeholder="Repite tu contraseña"
            autocomplete="new-password"
            required
          >
        </div>

        <!-- Error inline -->
        <p id="formError" class="text-sm" style="color:var(--text-red);display:none;"></p>

        <!-- TODO: backend — POST /api/auth/register con {nombre, correo, password} -->
        <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">
          Crear cuenta
        </button>

      </form>

      <div class="pixel-divider" style="margin: 20px 0;">
        <span></span><span></span><span></span>
      </div>

      <p class="auth-link">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </p>
      <p class="auth-link" style="margin-top:8px;">
        <a href="index.html" style="color:var(--text-muted)">← Volver al inicio</a>
      </p>
    </div>

  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const user  = document.getElementById('regUser').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const pass  = document.getElementById('regPass').value;
      const conf  = document.getElementById('regPassConfirm').value;
      const err   = document.getElementById('formError');

      err.style.display = 'none';

      if (user.length < 4) { err.textContent = 'El nombre debe tener al menos 4 caracteres.'; err.style.display = 'block'; return; }
      if (pass.length < 6) { err.textContent = 'La contraseña debe tener al menos 6 caracteres.'; err.style.display = 'block'; return; }
      if (pass !== conf)   { err.textContent = 'Las contraseñas no coinciden.'; err.style.display = 'block'; return; }

      // TODO: fetch('/api/auth/register', { method:'POST', body: JSON.stringify({nombre:user, correo:email, password:pass}) })
      // Si 201 → redirigir a login.html con mensaje de éxito
      console.log('[Backend TODO] Registro:', user, email);
      window.location.href = 'login.html';
    });
  </script>

</body>
</html>
